<ion-modal [isOpen]="isOpen" (didDismiss)="close()" class="b2c-dialog">
  <ng-template>
    <ion-header class="b2c-dialog__header">
      <ion-toolbar>
        <ion-title>{{ title }}</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="close()" aria-label="Fechar">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="b2c-dialog__body ion-padding">
      <ng-content></ng-content>
    </ion-content>
    <ion-footer *ngIf="showFooter" class="b2c-dialog__footer ion-padding">
      <ion-button expand="block" (click)="confirm.emit(); close()">{{ confirmLabel }}</ion-button>
      <ion-button expand="block" fill="outline" (click)="cancel.emit(); close()">{{ cancelLabel }}</ion-button>
    </ion-footer>
  </ng-template>
</ion-modal>
